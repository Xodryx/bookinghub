# nginx: serves Laravel's public/ folder and forwards PHP to php-fpm ("backend" service)
server {
    listen 80;
    server_name localhost;

    root /var/www/html/public;
    index index.php;

    # All routes go through Laravel's front controller (public/index.php)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # .php requests are executed by php-fpm on the "backend" container
    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
